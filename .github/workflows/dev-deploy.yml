name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: playoffe/workers
  ECS_CLUSTER: playoffe-dev-workers
  ECS_SERVICE: playoffe-dev-workers
  ECS_TASK_FAMILY: playoffe-dev-workers

jobs:
  # ── 1. Migrations on Supabase dev ─────────────────────────────────────────
  migrate:
    name: Supabase Migrations (Dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to dev
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --project-ref ${{ secrets.DEV_SUPABASE_PROJECT_REF }}
          echo "✓ Migrations applied to dev"

  # ── 2. Build Docker image and push to ECR ─────────────────────────────────
  build-and-push:
    name: Build & Push Workers Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          TAG="dev-${{ github.sha }}"
          URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$TAG"
          echo "uri=$URI" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:dev-latest
          cache-to: type=inline

  # ── 3. Deploy to ECS dev ───────────────────────────────────────────────────
  deploy-ecs:
    name: ECS Deploy (Dev)
    runs-on: ubuntu-latest
    needs: [migrate, build-and-push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: workers
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy to ECS dev
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 4. Deploy frontend to Vercel dev ──────────────────────────────────────
  deploy-vercel:
    name: Vercel Dev Deploy
    runs-on: ubuntu-latest
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview = dev)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Deploy to dev alias
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          vercel alias set $URL dev.playoffe.com --token=${{ secrets.VERCEL_TOKEN }} || true
          echo "Dev deployment: $URL"
        working-directory: apps/web
